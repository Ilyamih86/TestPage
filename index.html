<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Моя первая страница</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 500px;
      margin: 50px auto;
      padding: 20px;
      background-color: #f0f0f0;
    }

    input, textarea {
      width: 100%;
      padding: 10px;
      margin: 10px 0;
      border: 1px solid #ccc;
      border-radius: 5px;
      font-size: 16px;
      box-sizing: border-box;
    }

    button {
      padding: 10px 20px;
      margin: 5px;
      font-size: 16px;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      /* Плавный переход при наведении */
      transition: transform 0.2s, background-color 0.2s, box-shadow 0.2s;
    }

    .btn-green {
      background-color: #4CAF50;
      color: white;
    }

    /* Эффект при наведении на зелёную кнопку */
    .btn-green:hover {
      background-color: #388E3C;
      transform: scale(1.5);
      box-shadow: 0 5px 15px rgba(0,0,0,0.3);
    }

    .btn-red {
      background-color: #f44336;
      color: white;
    }

    /* Эффект при наведении на красную кнопку */
    .btn-red:hover {
      background-color: #c62828;
      transform: scale(1.1);
      box-shadow: 0 5px 15px rgba(0,0,0,0.3);
    }

    /* Блок где появляются сообщения */
    #результат {
      margin-top: 30px;
    }

    /* Стиль одного сообщения */
    .сообщение {
      background-color: white;
      border-left: 5px solid #4CAF50;
      padding: 10px 15px;
      margin: 10px 0;
      border-radius: 5px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
      /* Плавное появление */
      animation: появление 0.3s ease;
    }

    @keyframes появление {
      from { opacity: 0; transform: translateY(-10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .сообщение p {
      margin: 3px 0;
      font-size: 14px;
    }

    .сообщение span {
      font-weight: bold;
      color: #4CAF50;
    }
  </style>
</head>
<body>

  <h1>Моя страница</h1>

  <!-- Поля для текста -->
  <input type="text" id="имя" placeholder="Введи своё имя">
  <input type="text" id="email" placeholder="Введи email">
  <textarea id="сообщение" rows="4" placeholder="Напиши сообщение..."></textarea>

  <!-- Кнопки -->
  <button class="btn-green" onclick="добавитьСообщение()">Отправить</button>
  <button class="btn-red" onclick="очистить()">Очистить</button>

  <!-- Сюда будут добавляться сообщения -->
  <div id="результат"></div>

  <script>
    function добавитьСообщение() {
      // Берём текст из полей
      const имя = document.getElementById('имя').value;
      const email = document.getElementById('email').value;
      const сообщение = document.getElementById('сообщение').value;

      // Проверяем что хоть что-то введено
      if (!имя && !email && !сообщение) {
        alert('Введи хоть что-нибудь!');
        return;
      }

      // Создаём новый блок с сообщением
      const блок = document.createElement('div');
      блок.className = 'сообщение';
      блок.innerHTML = `
        <p><span>Имя:</span> ${имя || '—'}</p>
        <p><span>Email:</span> ${email || '—'}</p>
        <p><span>Сообщение:</span> ${сообщение || '—'}</p>
      `;

      // Добавляем блок на страницу
      document.getElementById('результат').appendChild(блок);

      // Очищаем поля после отправки
      очистить();
    }

    function очистить() {
      document.getElementById('имя').value = '';
      document.getElementById('email').value = '';
      document.getElementById('сообщение').value = '';
    }
  </script>

</body>
</html>
