<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Auth App</title>

  <style>
    body {
      font-family: Arial;
      background: #f4f4f4;
      display: flex;
      height: 100vh;
      align-items: center;
      justify-content: center;
    }

    .box {
      background: white;
      padding: 20px;
      border-radius: 10px;
      width: 320px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }

    input, button {
      width: 100%;
      margin-top: 10px;
      padding: 10px;
    }

    button {
      background: #4CAF50;
      color: white;
      border: none;
      cursor: pointer;
    }

    #profile {
      display: none;
      text-align: center;
    }
  </style>
</head>
<body>

<div class="box">

  <!-- AUTH -->
  <div id="auth">
    <h2>Регистрация / Вход</h2>

    <input type="email" id="email" placeholder="Email">
    <input type="password" id="password" placeholder="Пароль">

    <button onclick="register()">Регистрация</button>
    <button onclick="login()">Вход</button>

    <p id="msg"></p>
  </div>

  <!-- PROFILE -->
  <div id="profile">
    <h2>Профиль</h2>
    <p id="userEmail"></p>
    <button onclick="logout()">Выйти</button>
  </div>

</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import { 
    getAuth, 
    createUserWithEmailAndPassword, 
    signInWithEmailAndPassword,
    signOut,
    onAuthStateChanged
  } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

  const firebaseConfig = {
    apiKey: "ТВОЙ_API_KEY",
    authDomain: "ТВОЙ_PROJECT.firebaseapp.com",
    projectId: "ТВОЙ_PROJECT",
    appId: "ТВОЙ_APP_ID"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);

  const msg = document.getElementById('msg');
  const authBlock = document.getElementById('auth');
  const profileBlock = document.getElementById('profile');
  const userEmail = document.getElementById('userEmail');

  // Регистрация
  window.register = async () => {
    const email = document.getElementById('email').value;
    const password = document.getElementById('password').value;

    try {
      await createUserWithEmailAndPassword(auth, email, password);
      msg.innerText = "Регистрация успешна ✅";
    } catch (e) {
      msg.innerText = e.message;
    }
  };

  // Вход
  window.login = async () => {
    const email = document.getElementById('email').value;
    const password = document.getElementById('password').value;

    try {
      await signInWithEmailAndPassword(auth, email, password);
      msg.innerText = "Вход выполнен ✅";
    } catch (e) {
      msg.innerText = e.message;
    }
  };

  // Выход
  window.logout = async () => {
    await signOut(auth);
  };

  // Отслеживание состояния
  onAuthStateChanged(auth, (user) => {
    if (user) {
      authBlock.style.display = "none";
      profileBlock.style.display = "block";
      userEmail.innerText = "Email: " + user.email;
    } else {
      authBlock.style.display = "block";
      profileBlock.style.display = "none";
    }
  });

</script>

</body>
</html>
