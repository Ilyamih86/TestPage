<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Регистрация</title>

  <style>
    body {
      font-family: Arial;
      background: #f4f4f4;
      display: flex;
      height: 100vh;
      align-items: center;
      justify-content: center;
    }

    .box {
      background: white;
      padding: 20px;
      border-radius: 10px;
      width: 320px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }

    h2 {
      text-align: center;
    }

    input, button {
      width: 100%;
      margin-top: 10px;
      padding: 10px;
      font-size: 14px;
    }

    button {
      background: #4CAF50;
      color: white;
      border: none;
      cursor: pointer;
    }

    button:hover {
      background: #45a049;
    }

    #msg {
      margin-top: 10px;
      text-align: center;
    }
  </style>
</head>
<body>

<div class="box">
  <h2>Регистрация</h2>

  <input type="email" id="email" placeholder="Email">
  <input type="password" id="password" placeholder="Пароль">

  <button onclick="register()">Зарегистрироваться</button>

  <p id="msg"></p>
</div>

<!-- ВАЖНО: используем современный Firebase (v10) -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import { getAuth, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

  const firebaseConfig = {
    apiKey: "AIzaSyB7UrSp5zmwwahOz4tsbq8rYWqUoEIu5_k",
    authDomain: "testpage-da094.firebaseapp.com",
    projectId: "testpage-da094",
    storageBucket: "testpage-da094.firebasestorage.app",
    messagingSenderId: "938184243668",
    appId: "1:938184243668:web:2cb527ec7f5cd41e0a7e41",
    measurementId: "G-5MF3D79SSD"
  };

  // Инициализация Firebase
  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);

  // делаем функцию доступной из HTML
  window.register = async function () {
    const email = document.getElementById('email').value;
    const password = document.getElementById('password').value;
    const msg = document.getElementById('msg');

    if (!email || !password) {
      msg.innerText = "Заполни все поля";
      return;
    }

    try {
      await createUserWithEmailAndPassword(auth, email, password);
      msg.innerText = "Регистрация успешна ✅";
    } catch (error) {
      msg.innerText = error.message;
    }
  };
</script>

</body>
</html>
