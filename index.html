<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Профиль</title>

  <style>
    body {
      font-family: Arial;
      background: #f4f4f4;
      display: flex;
      height: 100vh;
      align-items: center;
      justify-content: center;
    }

    .box {
      background: white;
      padding: 20px;
      border-radius: 10px;
      width: 320px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }

    input, button {
      width: 100%;
      margin-top: 10px;
      padding: 10px;
      box-sizing: border-box;
    }

    button {
      background: #4CAF50;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      transition: background 0.2s;
    }

    button:hover {
      background: #388E3C;
    }

    #profile { display: none; }

    #msg {
      color: red;
      font-size: 14px;
    }
  </style>
</head>
<body>

<div class="box">

  <!-- AUTH -->
  <div id="auth">
    <h2>Регистрация / Вход</h2>
    <input type="email" id="email" placeholder="Email">
    <input type="password" id="password" placeholder="Пароль">
    <button onclick="register()">Регистрация</button>
    <button onclick="login()">Вход</button>
    <p id="msg"></p>
  </div>

  <!-- PROFILE -->
  <div id="profile">
    <h2>Профиль</h2>
    <input type="text" id="name" placeholder="Ваше имя">
    <button onclick="saveProfile()">Сохранить</button>
    <p id="userEmail"></p>
    <button onclick="logout()">Выйти</button>
  </div>

</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import {
    getAuth,
    createUserWithEmailAndPassword,
    signInWithEmailAndPassword,
    signOut,
    onAuthStateChanged
  } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
  import {
    getFirestore,
    doc,
    setDoc,
    getDoc
  } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyB7UrSp5zmwwahOz4tsbq8rYWqUoEIu5_k",
    authDomain: "testpage-da094.firebaseapp.com",
    projectId: "testpage-da094",
    storageBucket: "testpage-da094.firebasestorage.app",
    messagingSenderId: "938184243668",
    appId: "1:938184243668:web:2cb527ec7f5cd41e0a7e41"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);

  const msg = document.getElementById('msg');
  const authBlock = document.getElementById('auth');
  const profileBlock = document.getElementById('profile');
  const userEmailEl = document.getElementById('userEmail');
  const nameInput = document.getElementById('name');

  // ✅ Исправлена ошибка с именами переменных
  window.register = async () => {
    const emailValue = document.getElementById('email').value;
    const passwordValue = document.getElementById('password').value;

    try {
      const userCred = await createUserWithEmailAndPassword(auth, emailValue, passwordValue);

      await setDoc(doc(db, "users", userCred.user.uid), {
        email: emailValue,
        name: ""
      });

      msg.style.color = "green";
      msg.innerText = "Регистрация успешна ✅";
    } catch (e) {
      msg.style.color = "red";
      msg.innerText = e.message;
    }
  };

  // ✅ Исправлена ошибка с именами переменных
  window.login = async () => {
    const emailValue = document.getElementById('email').value;
    const passwordValue = document.getElementById('password').value;

    try {
      await signInWithEmailAndPassword(auth, emailValue, passwordValue);
      msg.innerText = "";
    } catch (e) {
      msg.style.color = "red";
      msg.innerText = e.message;
    }
  };

  window.saveProfile = async () => {
    const user = auth.currentUser;

    await setDoc(doc(db, "users", user.uid), {
      email: user.email,
      name: nameInput.value
    });

    alert("Сохранено ✅");
  };

  window.logout = async () => {
    await signOut(auth);
  };

  onAuthStateChanged(auth, async (user) => {
    if (user) {
      authBlock.style.display = "none";
      profileBlock.style.display = "block";
      userEmailEl.innerText = "Email: " + user.email;

      const docSnap = await getDoc(doc(db, "users", user.uid));
      if (docSnap.exists()) {
        nameInput.value = docSnap.data().name || "";
      }
    } else {
      authBlock.style.display = "block";
      profileBlock.style.display = "none";
    }
  });

</script>

</body>
</html>
