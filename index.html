<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>MyApp Chat</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Arial', sans-serif;
      background: #0f0f0f;
      color: #f1f1f1;
      height: 100vh;
      overflow: hidden;
    }

    /* ========================
       СТРАНИЦА АВТОРИЗАЦИИ
    ======================== */
    #authPage {
      display: flex;
      height: 100vh;
      align-items: center;
      justify-content: center;
    }

    .box {
      background: #212121;
      padding: 35px 30px;
      border-radius: 12px;
      width: 360px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.5);
      animation: fadeIn 0.3s ease;
    }

    .logo {
      text-align: center;
      margin-bottom: 25px;
    }

    .logo span {
      font-size: 28px;
      font-weight: bold;
    }

    .logo span b { color: #ff0000; }

    .tabs {
      display: flex;
      background: #121212;
      border-radius: 8px;
      padding: 4px;
      margin-bottom: 25px;
    }

    .tab {
      flex: 1;
      text-align: center;
      padding: 8px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
      color: #aaa;
      transition: background 0.2s, color 0.2s;
      user-select: none;
    }

    .tab.active {
      background: #303030;
      color: #f1f1f1;
    }

    .input-group {
      margin-bottom: 15px;
    }

    .input-group label {
      display: block;
      font-size: 12px;
      color: #aaa;
      margin-bottom: 6px;
      letter-spacing: 0.5px;
    }

    input {
      width: 100%;
      padding: 12px 15px;
      background: #121212;
      border: 1px solid #303030;
      border-radius: 8px;
      color: #f1f1f1;
      font-size: 15px;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    input:focus {
      border-color: #3ea6ff;
      box-shadow: 0 0 0 2px rgba(62,166,255,0.15);
    }

    input::placeholder { color: #555; }

    .btn {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
      margin-top: 10px;
    }

    .btn:active { transform: scale(0.98); }

    .btn-primary { background: #3ea6ff; color: #0f0f0f; }
    .btn-primary:hover { background: #65b8ff; }
    .btn-primary:disabled { background: #2a5f8f; cursor: not-allowed; }

    #msg {
      font-size: 13px;
      text-align: center;
      margin-top: 12px;
      padding: 8px;
      border-radius: 6px;
      min-height: 18px;
    }

    #msg.success { background: rgba(62,166,255,0.1); color: #3ea6ff; }
    #msg.error   { background: rgba(255,68,68,0.1);  color: #ff4444; }

    /* ========================
       ГЛАВНАЯ СТРАНИЦА
    ======================== */
    #mainPage {
      display: none;
      height: 100vh;
      flex-direction: column;
    }

    /* --- Шапка --- */
    .topbar {
      height: 60px;
      background: #212121;
      border-bottom: 1px solid #303030;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 20px;
      flex-shrink: 0;
      z-index: 100;
    }

    .topbar-logo {
      font-size: 20px;
      font-weight: bold;
    }

    .topbar-logo b { color: #ff0000; }

    /* Профиль в шапке */
    .profile-widget {
      display: flex;
      align-items: center;
      gap: 10px;
      background: #2a2a2a;
      padding: 6px 12px;
      border-radius: 30px;
      cursor: pointer;
      transition: background 0.2s;
      position: relative;
    }

    .profile-widget:hover { background: #303030; }

    .avatar {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: #3ea6ff;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      font-weight: bold;
      color: #0f0f0f;
      text-transform: uppercase;
      flex-shrink: 0;
    }

    .profile-info {
      display: flex;
      flex-direction: column;
    }

    .profile-name  { font-size: 14px; font-weight: 600; }
    .profile-email { font-size: 11px; color: #aaa; }

    /* Дропдаун профиля */
    .profile-dropdown {
      display: none;
      position: absolute;
      top: calc(100% + 10px);
      right: 0;
      background: #212121;
      border: 1px solid #303030;
      border-radius: 10px;
      padding: 12px;
      width: 220px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.5);
      z-index: 200;
    }

    .profile-dropdown.open {
      display: block;
      animation: fadeIn 0.2s ease;
    }

    .dropdown-input-group { margin-bottom: 10px; }

    .dropdown-input-group label {
      display: block;
      font-size: 11px;
      color: #aaa;
      margin-bottom: 5px;
    }

    .dropdown-input-group input {
      padding: 8px 12px;
      font-size: 13px;
    }

    .dropdown-btn {
      width: 100%;
      padding: 8px;
      border: none;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
      margin-top: 5px;
    }

    .dropdown-btn-save {
      background: #3ea6ff;
      color: #0f0f0f;
    }

    .dropdown-btn-save:hover { background: #65b8ff; }

    .dropdown-btn-logout {
      background: transparent;
      color: #ff4444;
      border: 1px solid #ff4444;
    }

    .dropdown-btn-logout:hover { background: rgba(255,68,68,0.1); }

    /* ========================
       ОСНОВНОЙ LAYOUT
    ======================== */
    .layout {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    /* --- Левая панель — кто онлайн --- */
    .sidebar {
      width: 240px;
      background: #181818;
      border-right: 1px solid #303030;
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
    }

    .sidebar-header {
      padding: 15px 20px;
      font-size: 12px;
      font-weight: 600;
      color: #aaa;
      letter-spacing: 1px;
      text-transform: uppercase;
      border-bottom: 1px solid #303030;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    /* Зелёная точка онлайн */
    .online-dot {
      width: 8px;
      height: 8px;
      background: #2ecc71;
      border-radius: 50%;
      display: inline-block;
      box-shadow: 0 0 6px #2ecc71;
    }

    .online-count {
      margin-left: auto;
      background: #2ecc71;
      color: #0f0f0f;
      font-size: 11px;
      font-weight: 700;
      padding: 2px 7px;
      border-radius: 10px;
    }

    .online-list {
      flex: 1;
      overflow-y: auto;
      padding: 10px;
    }

    .online-list::-webkit-scrollbar { width: 3px; }
    .online-list::-webkit-scrollbar-track { background: #181818; }
    .online-list::-webkit-scrollbar-thumb { background: #303030; border-radius: 2px; }

    /* Один пользователь онлайн */
    .online-user {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 10px;
      border-radius: 8px;
      transition: background 0.2s;
      animation: fadeIn 0.3s ease;
    }

    .online-user:hover { background: #212121; }

    .online-user-avatar {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: #3ea6ff;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      font-weight: bold;
      color: #0f0f0f;
      text-transform: uppercase;
      flex-shrink: 0;
      position: relative;
    }

    /* Зелёная точка у аватара */
    .online-user-avatar::after {
      content: '';
      position: absolute;
      bottom: 0;
      right: 0;
      width: 9px;
      height: 9px;
      background: #2ecc71;
      border-radius: 50%;
      border: 2px solid #181818;
    }

    .online-user-name {
      font-size: 13px;
      color: #ddd;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* Ты сам */
    .online-user-name.is-you::after {
      content: ' (ты)';
      color: #3ea6ff;
      font-size: 11px;
    }

    /* --- Центральная область --- */
    .chat-area {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* Заголовок чата */
    .chat-header {
      padding: 15px 20px;
      border-bottom: 1px solid #303030;
      font-size: 15px;
      font-weight: 600;
      color: #f1f1f1;
      display: flex;
      align-items: center;
      gap: 8px;
      flex-shrink: 0;
    }

    /* Список сообщений */
    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .messages::-webkit-scrollbar { width: 4px; }
    .messages::-webkit-scrollbar-track { background: #0f0f0f; }
    .messages::-webkit-scrollbar-thumb { background: #303030; border-radius: 2px; }

    /* Одно сообщение */
    .message {
      display: flex;
      gap: 12px;
      animation: fadeIn 0.3s ease;
      max-width: 75%;
    }

    /* Моё сообщение — справа */
    .message.mine {
      align-self: flex-end;
      flex-direction: row-reverse;
    }

    .message-avatar {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: #3ea6ff;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      font-weight: bold;
      color: #0f0f0f;
      text-transform: uppercase;
      flex-shrink: 0;
      align-self: flex-end;
    }

    .message.mine .message-avatar {
      background: #65b8ff;
    }

    .message-body {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .message.mine .message-body {
      align-items: flex-end;
    }

    .message-author {
      font-size: 12px;
      color: #aaa;
      padding: 0 4px;
    }

    .message-bubble {
      background: #212121;
      border: 1px solid #303030;
      padding: 10px 14px;
      border-radius: 12px;
      border-bottom-left-radius: 4px;
      font-size: 14px;
      color: #f1f1f1;
      line-height: 1.5;
      word-break: break-word;
    }

    /* Моё сообщение — другой цвет */
    .message.mine .message-bubble {
      background: #1a3a5c;
      border-color: #1e4a7a;
      border-bottom-left-radius: 12px;
      border-bottom-right-radius: 4px;
    }

    .message-time {
      font-size: 11px;
      color: #555;
      padding: 0 4px;
    }

    /* Пустой чат */
    .empty-chat {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: #555;
      gap: 10px;
    }

    .empty-chat div { font-size: 48px; }
    .empty-chat p   { font-size: 15px; }

    /* --- Ввод сообщения снизу --- */
    .chat-input-area {
      padding: 15px 20px;
      border-top: 1px solid #303030;
      background: #181818;
      flex-shrink: 0;
    }

    .chat-input-wrapper {
      display: flex;
      align-items: flex-end;
      gap: 12px;
      background: #212121;
      border: 1px solid #303030;
      border-radius: 12px;
      padding: 10px 15px;
      transition: border-color 0.2s;
    }

    .chat-input-wrapper:focus-within {
      border-color: #3ea6ff;
      box-shadow: 0 0 0 2px rgba(62,166,255,0.1);
    }

    .chat-textarea {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      color: #f1f1f1;
      font-size: 14px;
      font-family: Arial, sans-serif;
      resize: none;
      max-height: 120px;
      min-height: 22px;
      line-height: 1.5;
    }

    .chat-textarea::placeholder { color: #555; }

    .input-actions {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-shrink: 0;
    }

    .char-counter {
      font-size: 11px;
      color: #555;
    }

    .send-btn {
      width: 36px;
      height: 36px;
      background: #3ea6ff;
      color: #0f0f0f;
      border: none;
      border-radius: 50%;
      font-size: 16px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s, transform 0.1s;
      flex-shrink: 0;
    }

    .send-btn:hover   { background: #65b8ff; }
    .send-btn:active  { transform: scale(0.92); }
    .send-btn:disabled { background: #2a5f8f; cursor: not-allowed; }

    /* Подсказка */
    .input-hint {
      text-align: center;
      font-size: 11px;
      color: #444;
      margin-top: 8px;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

<!-- АВТОРИЗАЦИЯ -->
<div id="authPage">
  <div class="box">
    <div class="logo"><span>My<b>App</b></span></div>

    <div class="tabs">
      <div class="tab active" id="tab-login" onclick="switchTab('login')">Вход</div>
      <div class="tab" id="tab-register" onclick="switchTab('register')">Регистрация</div>
    </div>

    <div class="input-group">
      <label>EMAIL</label>
      <input type="email" id="email" placeholder="example@mail.com">
    </div>

    <div class="input-group">
      <label>ПАРОЛЬ</label>
      <input type="password" id="password" placeholder="••••••••">
    </div>

    <button class="btn btn-primary" id="mainBtn" onclick="handleAuth()">Войти</button>
    <p id="msg"></p>
  </div>
</div>

<!-- ГЛАВНАЯ СТРАНИЦА -->
<div id="mainPage">

  <!-- Шапка -->
  <div class="topbar">
    <div class="topbar-logo">My<b>App</b></div>

    <div class="profile-widget" onclick="toggleDropdown()">
      <div class="avatar" id="avatar">?</div>
      <div class="profile-info">
        <span class="profile-name"  id="profileName">Загрузка...</span>
        <span class="profile-email" id="userEmail"></span>
      </div>

      <div class="profile-dropdown" id="profileDropdown">
        <div class="dropdown-input-group">
          <label>НИКНЕЙМ</label>
          <input type="text" id="name" placeholder="Введите никнейм">
        </div>
        <button class="dropdown-btn dropdown-btn-save"   onclick="saveProfile(event)">Сохранить</button>
        <button class="dropdown-btn dropdown-btn-logout" onclick="logout(event)">Выйти</button>
      </div>
    </div>
  </div>

  <!-- Layout -->
  <div class="layout">

    <!-- Левая панель — онлайн -->
    <div class="sidebar">
      <div class="sidebar-header">
        <span class="online-dot"></span>
        Онлайн
        <span class="online-count" id="onlineCount">0</span>
      </div>
      <div class="online-list" id="onlineList"></div>
    </div>

    <!-- Чат -->
    <div class="chat-area">

      <div class="chat-header">
        💬 Общий чат
      </div>

      <!-- Сообщения -->
      <div class="messages" id="messages">
        <div class="empty-chat">
          <div>💬</div>
          <p>Напишите первое сообщение!</p>
        </div>
      </div>

      <!-- Ввод снизу -->
      <div class="chat-input-area">
        <div class="chat-input-wrapper">
          <textarea
            class="chat-textarea"
            id="messageInput"
            placeholder="Написать сообщение..."
            maxlength="500"
            rows="1"
            oninput="onInput()"
          ></textarea>
          <div class="input-actions">
            <span class="char-counter" id="charCounter">500</span>
            <button class="send-btn" id="sendBtn" onclick="sendMessage()">➤</button>
          </div>
        </div>
        <div class="input-hint">Enter — отправить &nbsp;·&nbsp; Shift+Enter — новая строка</div>
      </div>

    </div>
  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import {
    getAuth,
    createUserWithEmailAndPassword,
    signInWithEmailAndPassword,
    signOut,
    onAuthStateChanged
  } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
  import {
    getFirestore,
    doc, setDoc, getDoc,
    collection, addDoc,
    query, orderBy, onSnapshot,
    serverTimestamp,
    deleteDoc
  } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyB7UrSp5zmwwahOz4tsbq8rYWqUoEIu5_k",
    authDomain: "testpage-da094.firebaseapp.com",
    projectId: "testpage-da094",
    storageBucket: "testpage-da094.firebasestorage.app",
    messagingSenderId: "938184243668",
    appId: "1:938184243668:web:2cb527ec7f5cd41e0a7e41"
  };

  const app  = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db   = getFirestore(app);

  const authPage      = document.getElementById('authPage');
  const mainPage      = document.getElementById('mainPage');
  const msgEl         = document.getElementById('msg');
  const mainBtn       = document.getElementById('mainBtn');
  const avatarEl      = document.getElementById('avatar');
  const profileNameEl = document.getElementById('profileName');
  const userEmailEl   = document.getElementById('userEmail');
  const nameInput     = document.getElementById('name');
  const messagesEl    = document.getElementById('messages');
  const messageInput  = document.getElementById('messageInput');
  const sendBtn       = document.getElementById('sendBtn');
  const onlineList    = document.getElementById('onlineList');
  const onlineCount   = document.getElementById('onlineCount');

  let currentTab      = 'login';
  let currentUserName = '';
  let currentUID      = '';
  let unsubMessages   = null;
  let unsubOnline     = null;

  // ======= АВТОРИЗАЦИЯ =======

  window.switchTab = (tab) => {
    currentTab = tab;
    document.getElementById('tab-login').classList.toggle('active', tab === 'login');
    document.getElementById('tab-register').classList.toggle('active', tab === 'register');
    mainBtn.textContent = tab === 'login' ? 'Войти' : 'Зарегистрироваться';
    showMsg('', '');
  };

  function showMsg(text, type) {
    msgEl.textContent = text;
    msgEl.className = type;
  }

  window.handleAuth = async () => {
    const emailVal    = document.getElementById('email').value;
    const passwordVal = document.getElementById('password').value;

    if (!emailVal || !passwordVal) { showMsg('Заполните все поля', 'error'); return; }

    mainBtn.disabled    = true;
    mainBtn.textContent = 'Загрузка...';

    try {
      if (currentTab === 'register') {
        const cred = await createUserWithEmailAndPassword(auth, emailVal, passwordVal);
        await setDoc(doc(db, "users", cred.user.uid), { email: emailVal, name: "" });
        showMsg('Готово! ✅', 'success');
      } else {
        await signInWithEmailAndPassword(auth, emailVal, passwordVal);
      }
    } catch (e) {
      const errors = {
        'auth/invalid-email':        'Неверный формат email',
        'auth/wrong-password':       'Неверный пароль',
        'auth/user-not-found':       'Пользователь не найден',
        'auth/email-already-in-use': 'Email уже используется',
        'auth/weak-password':        'Минимум 6 символов',
        'auth/invalid-credential':   'Неверный email или пароль',
      };
      showMsg(errors[e.code] || e.message, 'error');
    }

    mainBtn.disabled    = false;
    mainBtn.textContent = currentTab === 'login' ? 'Войти' : 'Зарегистрироваться';
  };

  // ======= ПРОФИЛЬ =======

  window.toggleDropdown = () => {
    document.getElementById('profileDropdown').classList.toggle('open');
  };

  document.addEventListener('click', (e) => {
    const w = document.querySelector('.profile-widget');
    if (w && !w.contains(e.target)) {
      document.getElementById('profileDropdown').classList.remove('open');
    }
  });

  window.saveProfile = async (e) => {
    e.stopPropagation();
    const newName = nameInput.value.trim();
    const user    = auth.currentUser;

    await setDoc(doc(db, "users", user.uid), { email: user.email, name: newName });

    // Обновляем запись онлайн
    await setDoc(doc(db, "online", user.uid), {
      name: newName || user.email,
      uid:  user.uid
    });

    currentUserName = newName;
    profileNameEl.textContent = newName || 'Профиль';
    updateAvatar(newName || user.email);
    document.getElementById('profileDropdown').classList.remove('open');
  };

  window.logout = async (e) => {
    e.stopPropagation();
    await deleteDoc(doc(db, "online", currentUID));
    if (unsubMessages) unsubMessages();
    if (unsubOnline)   unsubOnline();
    await signOut(auth);
  };

  function updateAvatar(text) {
    avatarEl.textContent = text ? text[0].toUpperCase() : '?';
  }

  // ======= СООБЩЕНИЯ =======

  window.onInput = () => {
    const len = messageInput.value.length;
    document.getElementById('charCounter').textContent = 500 - len;

    // Авторастягивание поля
    messageInput.style.height = 'auto';
    messageInput.style.height = Math.min(messageInput.scrollHeight, 120) + 'px';
  };

  window.sendMessage = async () => {
    const text = messageInput.value.trim();
    if (!text) return;

    sendBtn.disabled = true;

    try {
      await addDoc(collection(db, "messages"), {
        text,
        author:    currentUserName || auth.currentUser.email,
        uid:       auth.currentUser.uid,
        createdAt: serverTimestamp()
      });
      messageInput.value = '';
      messageInput.style.height = 'auto';
      document.getElementById('charCounter').textContent = '500';
    } catch (e) {
      alert('Ошибка: ' + e.message);
    }

    sendBtn.disabled = false;
    messageInput.focus();
  };

  // Enter — отправить, Shift+Enter — новая строка
  document.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey && document.activeElement === messageInput) {
      e.preventDefault();
      sendMessage();
    }
  });

  function loadMessages() {
    const q = query(collection(db, "messages"), orderBy("createdAt", "asc"));

    unsubMessages = onSnapshot(q, (snap) => {
      if (snap.empty) {
        messagesEl.innerHTML = `
          <div class="empty-chat">
            <div>💬</div>
            <p>Напишите первое сообщение!</p>
          </div>`;
        return;
      }

      messagesEl.innerHTML = '';

      snap.forEach((d) => {
        const data  = d.data();
        const isMine = data.uid === currentUID;
        const time  = data.createdAt
          ? new Date(data.createdAt.seconds * 1000).toLocaleTimeString('ru', {
              hour: '2-digit', minute: '2-digit'
            })
          : '';

        const msg = document.createElement('div');
        msg.className = `message ${isMine ? 'mine' : ''}`;
        msg.innerHTML = `
          <div class="message-avatar">${data.author[0].toUpperCase()}</div>
          <div class="message-body">
            <div class="message-author">${isMine ? 'Вы' : data.author}</div>
            <div class="message-bubble">${data.text}</div>
            <div class="message-time">${time}</div>
          </div>
        `;
        messagesEl.appendChild(msg);
      });

      // Скролл вниз
      messagesEl.scrollTop = messagesEl.scrollHeight;
    });
  }
